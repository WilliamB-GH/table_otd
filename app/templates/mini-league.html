{% extends "layout.html" %}

{% block title %}
    Mini-League
{% endblock %}

{% block main %}
<div class="content">
    <form action="/mini-league" method="post">  
        <label for="start_date">Start Date:</label>
        <input type="date" class="date" name="start_date" min="{{ MIN_DATE }}" max="{{ MAX_DATE }}" value="{{ MIN_DATE }}"/>
        <label for="end_date">End Date:</label>
        <input type="date" class="date" name="end_date" min="{{ MIN_DATE }}" max="{{ MAX_DATE }}" value="{{ MAX_DATE }}"/>

        <div class="multi-select">

            <div class="panel">
                <input id="filter" placeholder="Filter...">
                <select id="available" multiple></select>
            </div>

            <div class="controls">
                <button type="button" class="button" id="add"><label> &gt; </label></button>
                <button type="button" class="button" id="remove"><label>&lt;</label></button>
                <button type="button" class="button" id="removeAll"><label>&lt;&lt;</label></button>
            </div>

            <div class="panel">
                <select id="selected" name="teams" multiple></select>
            </div>

        </div>

        <br>
        <div class="content">
            <button class="button" type="submit"><label>Get Table</label></button>
        </div>
    </form>
    <script src="static/mini-league-picker.js"></script>
</div>
{% endblock %}
