<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <style>

        .multi-select {
            display: flex;
            gap: 10px;
            width: 650px;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel input {
            padding: 6px;
            margin-bottom: 6px;
        }

        .panel select {
            height: 260px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
        }

        button {
            padding: 6px 10px;
        }
    </style>
</head>

<body>

    <form>

        <div class="multi-select">

            <div class="panel">
                <input id="filter" placeholder="Filter...">
                <select id="available" multiple></select>
            </div>

            <div class="controls">
                <button type="button" id="add"> &gt; </button>
                <button type="button" id="remove"> &lt; </button>
                <button type="button" id="removeAll"> &lt;&lt; </button>
            </div>

            <div class="panel">
                <select id="selected" name="items" multiple></select>
            </div>

        </div>

        <br>
        <button type="submit">Submit</button>

    </form>

</body>

</html>
