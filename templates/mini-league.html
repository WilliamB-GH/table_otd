{% extends "layout.html" %}

{% block title %}
    Mini-League
{% endblock %}

{% block main %}
<div class="content">
    <form action="/mini-league" method="post">  
        <label for="start_date">Start Date:</label>
        <input type="date" class="date" name="start_date" min="1992-08-01" max="2026-03-17" value="1992-08-01"/>
        <label for="end_date">End Date:</label>
        <input type="date" class="date" name="end_date" min="1992-08-01" max="2026-03-17" value="2026-03-17"/>

        <div class="multi-select">

            <div class="panel">
                <input id="filter" placeholder="Filter...">
                <select id="available" multiple></select>
            </div>

            <div class="controls">
                <button type="button" class="button" id="add"> &gt; </button>
                <button type="button" class="button" id="remove"> &lt; </button>
                <button type="button" class="button" id="removeAll"> &lt;&lt; </button>
            </div>

            <div class="panel">
                <select id="selected" name="teams" multiple></select>
            </div>

        </div>

        <br>
        <div class="content">
            <button class="button" type="submit">Get Table</button>
        </div>
    </form>
    <script src="static/mini-league-picker.js"></script>
</div>
{% endblock %}
